<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Calendário de Atividades</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📅 Calendário de Atividades Programadas - Time Dai </h1>

  <div id="calendar"></div>

  <!-- Formulário de remarcação -->
  <div id="formulario" style="display:none;">
    <h2> Solicitar reprogramação </h2>
    <form id="formRemarcacao">
      <input type="text" id="atividadeNome" placeholder="Atividade" readonly>
      
      <input type="text" placeholder="Nome" required>
      <input type="date" id="dataInput" required>
      
      <div class="linha-motivo">
        <textarea placeholder="Motivo"></textarea>
      </div>
      
      <button type="submit">Enviar</button>
      <button type="button" id="cancelar">Cancelar</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
